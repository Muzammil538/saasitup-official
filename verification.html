<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaasItUp - AI Automation & Software Development Agency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0e;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            transform: rotate(45deg);
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo span {
            font-size: 32px;
            font-weight: bold;
            color: white;
            transform: rotate(-45deg);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 999px;
            color: #a5b4fc;
            font-size: 0.875rem;
            margin-top: 1rem;
        }
        .message {
            color: #94a3b8;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>S</span>
        </div>
        <h1>SaasItUp</h1>
        <p style="font-size: 1.25rem; color: #cbd5e1; margin-bottom: 0.5rem;">AI Automation & Software Development Agency</p>
        <p style="color: #64748b;">Build Smarter. Scale Faster.</p>
        <div class="status">
            ✅ Project Ready
        </div>
        <p class="message">
            Open http://localhost:3000 to see the full landing page
        </p>
    </div>
</body>
</html>
